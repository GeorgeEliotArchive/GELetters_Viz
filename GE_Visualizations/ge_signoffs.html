    const chartData = DATA.yearly.map(d => ({...d}));

    function StackTooltip({active,payload,label}){
      if(!active||!payload?.length)return null;
      const d=payload[0]?.payload;
      const cats=DATA.categories.filter(c=>d[c]>0).sort((a,b)=>d[b]-d[a]);
      return(
        <div style={{background:"#ebe3d6",border:"1px solid #4a2030",borderRadius:10,padding:"14px 18px",fontFamily:"system-ui,sans-serif",maxWidth:280}}>
          <div style={{fontSize:16,fontWeight:700,color:"#3a2a1a",marginBottom:3}}>{label}</div>
          <div style={{fontSize:11,color:"#7a6a56",marginBottom:4}}>{d?.count} letters</div>
          <div style={{fontSize:12,color:"#b45309",marginBottom:10}}>Warmth: <strong>{d?.warmth?.toFixed(2)}</strong>/5</div>
          {cats.map(c=>(<div key={c} style={{display:"flex",justifyContent:"space-between",padding:"2px 0"}}><span style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:8,height:8,borderRadius:2,background:CAT_COLORS[c]}}/><span style={{fontSize:12,color:"#6a5a48"}}>{c}</span></span><span style={{fontSize:12,fontWeight:600,color:CAT_COLORS[c]}}>{d[c]}</span></div>))}
          <div style={{borderTop:"1px solid #4a2030",marginTop:6,paddingTop:6,fontSize:11,color:"#7a6a56"}}>Warm: {(d.warm_pct*100).toFixed(0)}% · Formal: {(100-d.warm_pct*100).toFixed(0)}%</div>
        </div>
      );
    }

    function WarmthTooltip({active,payload,label}){
      if(!active||!payload?.length)return null;
      const d=payload[0]?.payload;
      const wl=d.warmth>=4?"Very Warm":d.warmth>=3?"Warm":d.warmth>=2.5?"Moderate":"Formal";
      return(
        <div style={{background:"#ebe3d6",border:"1px solid #4a2030",borderRadius:10,padding:"14px 18px",fontFamily:"system-ui,sans-serif"}}>
          <div style={{fontSize:16,fontWeight:700,color:"#3a2a1a"}}>{label}</div>
          <div style={{fontSize:12,color:"#7a6a56",marginBottom:6}}>{d?.count} sign-offs</div>
          <div style={{fontSize:14,color:"#b45309"}}>Warmth: <strong>{d?.warmth?.toFixed(2)}</strong> <span style={{fontSize:12,color:"#7a6a56"}}>({wl})</span></div>
          <div style={{fontSize:12,color:"#e879f9",marginTop:4}}>Intimate: {(d?.warm_pct*100).toFixed(0)}%</div>
        </div>
      );
    }

    function RecipientCard({name,data,isSelected,onClick}){
      const wc=data.avg_warmth>=3.5?"#f43f5e":data.avg_warmth>=3?"#fb923c":data.avg_warmth>=2.5?"#a78bfa":"#38bdf8";
      const topCats=Object.entries(data.categories).sort((a,b)=>b[1]-a[1]).slice(0,4);
      const topRaw=Object.entries(data.top_raw).sort((a,b)=>b[1]-a[1]).slice(0,3);
      return(
        <div onClick={onClick} style={{background:isSelected?"#e2d9cc":"#ebe3d6",borderRadius:12,border:`1.5px solid ${isSelected?wc:"#d6cab8"}`,padding:16,cursor:"pointer",transition:"all 0.2s"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:14,fontWeight:700,color:"#3a2a1a"}}>{name}</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:11,color:"#7a6a56"}}>{data.count} letters</span>
              <span style={{padding:"2px 8px",borderRadius:10,background:wc+"25",color:wc,fontSize:11,fontWeight:700}}>{data.avg_warmth.toFixed(1)}</span>
            </div>
          </div>
          <div style={{display:"flex",borderRadius:4,overflow:"hidden",height:8,marginBottom:10,background:"#f5f0e6"}}>
            {topCats.map(([cat,count])=>(<div key={cat} style={{width:`${(count/data.count)*100}%`,background:CAT_COLORS[cat],minWidth:2}} title={`${cat}: ${count}`}/>))}
          </div>
          {isSelected&&(
            <div style={{marginTop:8}}>
              <div style={{fontSize:11,color:"#7a6a56",marginBottom:6,fontWeight:600}}>Most used sign-offs:</div>
              {topRaw.map(([raw,count])=>(<div key={raw} style={{display:"flex",justifyContent:"space-between",padding:"3px 8px",background:"#f5f0e6",borderRadius:4,marginBottom:3}}><span style={{fontSize:12,color:"#6a5a48",fontStyle:"italic",fontFamily:"'Crimson Pro',Palatino,Georgia,serif"}}>"{raw}"</span><span style={{fontSize:11,color:"#7a6a56",fontWeight:600}}>×{count}</span></div>))}
              <div style={{fontSize:11,color:"#7a6a56",marginTop:6}}>Categories: {topCats.map(([c,n])=>`${c} (${n})`).join(", ")}</div>
            </div>
          )}
        </div>
      );
    }

    function SignOffViz(){

      const[showCPs,setShowCPs]=useState(true);
      const[showEvents,setShowEvents]=useState(true);
      const[selectedRecipient,setSelectedRecipient]=useState(null);
      const[activeCatGroups,setActiveCatGroups]=useState({"Warm/Intimate":true,"Middle/Familiar":true,"Formal/Professional":true});

      const activeCats=useMemo(()=>{
        const c=[];
        Object.entries(activeCatGroups).forEach(([g,on])=>{if(on)c.push(...CAT_GROUPS[g]);});
        return c;
      },[activeCatGroups]);

      const sortedRecipients=useMemo(()=>Object.entries(DATA.recipient_signoffs).sort((a,b)=>b[1].count-a[1].count),[]);

      return(
        <div style={{background:"linear-gradient(180deg, #faf6ee 0%, #f5f0e6 100%)",minHeight:"100vh",color:"#3a2a1a",fontFamily:"system-ui,sans-serif",padding:"24px 20px"}}>
          <div style={{maxWidth:1100,margin:"0 auto"}}>

            {/* Header */}
            <div style={{marginBottom:28}}>
              <div style={{fontSize:11,letterSpacing:5,color:"#e879f9",textTransform:"uppercase",marginBottom:10,fontWeight:600}}>George Eliot Letters Archive · Epistolary Conventions</div>
              <h1 style={{fontSize:30,fontWeight:300,margin:0,lineHeight:1.25,fontFamily:"'Crimson Pro',Georgia,serif"}}>The Art of <span style={{fontWeight:700,background:"linear-gradient(90deg,#f43f5e,#e879f9,#d97706)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Signing Off</span></h1>
              <p style={{fontSize:14,color:"#7a6a56",marginTop:10,maxWidth:700,lineHeight:1.6}}>How George Eliot closed 2,076 letters across 44 years — from the devotional "your affectionate" of her youth to the warm "your loving" of her later years. Sign-offs reveal the emotional register she chose for each relationship.</p>
            </div>

            {/* Controls */}
            <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:18,alignItems:"center"}}>
              <div style={{display:"flex",gap:4,background:"#ebe3d6",padding:3,borderRadius:8,border:"1px solid #3a1a28"}}>
                {[{id:"stacked",label:"Category Mix"},{id:"warmth",label:"Warmth Score"}].map(v=>(
                  <button key={v.id} onClick={()=>setView(v.id)} style={{padding:"7px 14px",borderRadius:6,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:view===v.id?"#e879f9":"transparent",color:view===v.id?"#f5f0e6":"#7a6a56",transition:"all 0.2s"}}>{v.label}</button>
                ))}
              </div>
              {view==="stacked"&&Object.entries(CAT_GROUPS).map(([group,cats])=>{
                const on=activeCatGroups[group];
                const c=cats[0];
                return(<button key={group} onClick={()=>setActiveCatGroups(p=>({...p,[group]:!p[group]}))} style={{padding:"5px 12px",borderRadius:16,border:`1.5px solid ${on?CAT_COLORS[c]:"#d6cab8"}`,background:on?CAT_COLORS[c]+"18":"transparent",color:on?CAT_COLORS[c]:"#9a8a76",cursor:"pointer",fontSize:11,fontWeight:500}}>{group}</button>);
              })}
              <button onClick={()=>setShowCPs(p=>!p)} style={{padding:"5px 12px",borderRadius:16,border:`1.5px solid ${showCPs?"#b45309":"#d6cab8"}`,background:showCPs?"#b4530920":"transparent",color:showCPs?"#b45309":"#9a8a76",cursor:"pointer",fontSize:11,fontWeight:500}}>⬥ Change Points</button>
              <button onClick={()=>setShowEvents(p=>!p)} style={{padding:"5px 12px",borderRadius:16,border:`1.5px solid ${showEvents?"#22d3ee":"#d6cab8"}`,background:showEvents?"#22d3ee15":"transparent",color:showEvents?"#22d3ee":"#9a8a76",cursor:"pointer",fontSize:11,fontWeight:500}}>Life Events</button>
            </div>

            {/* Chart */}
            <div style={{background:"#ebe3d6",borderRadius:14,border:"1px solid #3a1a28",padding:"20px 12px 8px 0"}}>
              {view==="stacked"&&(
                <ResponsiveContainer width="100%" height={400}>
                  <AreaChart data={chartData} margin={{top:28,right:20,left:10,bottom:10}}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#d6cab8"/>
                    <XAxis dataKey="year" tick={{fill:"#7a6a56",fontSize:11}} axisLine={{stroke:"#d6cab8"}}/>
                    <YAxis tick={{fill:"#7a6a56",fontSize:11}} tickLine={false} axisLine={false}/>
                    <Tooltip content={<StackTooltip/>}/>
                    {showCPs&&DATA.warmth_changepoints.map(yr=><ReferenceLine key={yr} x={yr} stroke="#d97706" strokeDasharray="6 3" strokeWidth={2} label={{value:`${yr}`,position:"top",fill:"#b45309",fontSize:10,fontWeight:700}}/>)}
                    {showEvents&&LIFE_EVENTS.map(e=><ReferenceLine key={e.year} x={e.year} stroke="#22d3ee" strokeDasharray="2 4" strokeWidth={1} strokeOpacity={0.5}/>)}
                    {activeCats.map(c=><Area key={c} type="monotone" dataKey={c} stackId="1" stroke={CAT_COLORS[c]} fill={CAT_COLORS[c]} fillOpacity={0.6} strokeWidth={1}/>)}
                    <Brush dataKey="year" height={22} fill="#ebe3d6" stroke="#d6cab8"><BarChart><Bar dataKey="count" fill="#d6cab8"/></BarChart></Brush>
                  </AreaChart>
                </ResponsiveContainer>
              )}
              {view==="warmth"&&(
                <ResponsiveContainer width="100%" height={400}>
                  <ComposedChart data={chartData} margin={{top:28,right:20,left:10,bottom:10}}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#d6cab8"/>
                    <XAxis dataKey="year" tick={{fill:"#7a6a56",fontSize:11}} axisLine={{stroke:"#d6cab8"}}/>
                    <YAxis yAxisId="left" tick={{fill:"#7a6a56",fontSize:11}} tickLine={false} axisLine={false} domain={[1.5,4.5]} label={{value:"Warmth",angle:-90,position:"insideLeft",fill:"#7a6a56",fontSize:11}}/>
                    <YAxis yAxisId="right" orientation="right" tick={{fill:"#e879f9",fontSize:11}} tickLine={false} axisLine={false} tickFormatter={v=>(v*100).toFixed(0)+"%"} domain={[0,1]}/>
                    <Tooltip content={<WarmthTooltip/>}/>
                    {showCPs&&DATA.warmth_changepoints.map(yr=><ReferenceLine key={yr} x={yr} yAxisId="left" stroke="#d97706" strokeDasharray="6 3" strokeWidth={2} label={{value:`${yr}`,position:"top",fill:"#b45309",fontSize:10,fontWeight:700}}/>)}
                    {showCPs&&DATA.warm_pct_changepoints.map(yr=><ReferenceLine key={yr} x={yr} yAxisId="left" stroke="#e879f9" strokeDasharray="4 4" strokeWidth={1.5} label={{value:`${yr}`,position:"bottom",fill:"#e879f9",fontSize:10,fontWeight:600}}/>)}
                    {showEvents&&LIFE_EVENTS.map(e=><ReferenceLine key={e.year} x={e.year} yAxisId="left" stroke="#22d3ee" strokeDasharray="2 4" strokeWidth={1} strokeOpacity={0.5}/>)}
                    <Line yAxisId="left" type="monotone" dataKey="warmth" stroke="#d97706" strokeWidth={2.5} dot={false} activeDot={{r:6,fill:"#b45309",stroke:"#ebe3d6",strokeWidth:2}} name="Warmth Score"/>
                    <Area yAxisId="right" type="monotone" dataKey="warm_pct" stroke="#e879f9" fill="#e879f9" fillOpacity={0.1} strokeWidth={2} dot={false} name="% Intimate"/>
                    <Legend wrapperStyle={{fontSize:12,color:"#7a6a56",paddingTop:8}}/>
                    <Brush dataKey="year" height={22} fill="#ebe3d6" stroke="#d6cab8"><BarChart><Bar dataKey="count" fill="#d6cab8"/></BarChart></Brush>
                  </ComposedChart>
                </ResponsiveContainer>
              )}
            </div>

            {/* Segment Cards */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:14,marginTop:20}}>
              {DATA.warmth_segments.map((seg,i)=>{
                const prev=i>0?DATA.warmth_segments[i-1]:null;
                const pct=prev?((seg.mean-prev.mean)/prev.mean*100):null;
                const wl=seg.mean>=3?"Warm":seg.mean>=2.5?"Moderate":"Formal-leaning";
                const sc=seg.mean>=3?"#f43f5e":seg.mean>=2.5?"#a78bfa":"#38bdf8";
                return(
                  <div key={i} style={{padding:18,background:"#ebe3d6",borderRadius:12,border:"1px solid #3a1a28",borderTop:`3px solid ${sc}`}}>
                    <div style={{fontSize:16,fontWeight:700,color:"#3a2a1a",marginBottom:4}}>{seg.start_year}–{seg.end_year}</div>
                    <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:8}}>
                      <span style={{fontSize:28,fontWeight:300,color:sc}}>{seg.mean.toFixed(2)}</span>
                      <span style={{fontSize:12,color:"#7a6a56"}}>{wl}</span>
                      {pct!==null&&<span style={{fontSize:12,fontWeight:600,color:pct>0?"#4ade80":"#fb923c"}}>{pct>0?"↑":"↓"}{Math.abs(pct).toFixed(1)}%</span>}
                    </div>
                    <p style={{fontSize:12,color:"#6a5a48",lineHeight:1.6,margin:0}}>
                      {i===0&&"The earliest letters carry warm, devotional sign-offs ('your affectionate') from the young Marian Evans writing to close friends like Maria Lewis."}
                      {i===1&&"Professional relationships grow — 'yours truly' dominates Blackwood correspondence. The formal middle period aligns with her public literary career."}
                      {i===2&&"After 1867, warmth rebounds: 'your loving' replaces 'your affectionate' and letters to family (Charles Lee Lewes) and friends grow increasingly tender."}
                    </p>
                  </div>
                );
              })}
            </div>

            {/* Recipients */}
            <div style={{marginTop:24,background:"#ebe3d6",borderRadius:14,border:"1px solid #3a1a28",padding:24}}>
              <h2 style={{fontSize:18,fontWeight:700,margin:"0 0 6px 0",color:"#3a2a1a"}}>Sign-Offs by Recipient</h2>
              <p style={{fontSize:12,color:"#7a6a56",margin:"0 0 16px 0"}}>How Eliot tailored her closings to each relationship. Click to see their most common sign-offs.</p>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:12}}>
                {sortedRecipients.map(([name,data])=>(<RecipientCard key={name} name={name} data={data} isSelected={selectedRecipient===name} onClick={()=>setSelectedRecipient(selectedRecipient===name?null:name)}/>))}
              </div>
            </div>

            {/* Warmth Scale */}
            <div style={{marginTop:20,background:"#ebe3d6",borderRadius:14,border:"1px solid #3a1a28",padding:20}}>
              <div style={{fontSize:13,fontWeight:700,color:"#3a2a1a",marginBottom:12}}>Warmth Scale</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0 8px"}}>
                {[{s:"1.0",l:"Obliged",c:"#38bdf8"},{s:"1.5",l:"Faithfully",c:"#38bdf8"},{s:"2.0",l:"Neutral",c:"#64748b"},{s:"2.5",l:"Truly",c:"#a78bfa"},{s:"3.0",l:"Sincerely",c:"#a78bfa"},{s:"4.0",l:"Affectionate",c:"#fb923c"},{s:"4.5",l:"Loving",c:"#f43f5e"},{s:"5.0",l:"Devoted",c:"#f43f5e"}].map(w=>(
                  <div key={w.s} style={{textAlign:"center"}}>
                    <div style={{width:32,height:6,borderRadius:3,background:w.c,margin:"0 auto 4px"}}/>
                    <div style={{fontSize:11,fontWeight:700,color:w.c}}>{w.s}</div>
                    <div style={{fontSize:10,color:"#7a6a56"}}>{w.l}</div>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:8,padding:"0 8px"}}>
                <span style={{fontSize:10,color:"#38bdf8"}}>← FORMAL</span>
                <span style={{fontSize:10,color:"#f43f5e"}}>INTIMATE →</span>
              </div>
            </div>

            <div style={{marginTop:16,padding:16,fontSize:11,color:"#9a8a76",lineHeight:1.6,borderTop:"1px solid #3a1a28"}}>
              <strong style={{color:"#7a6a56"}}>Methodology:</strong> Sign-offs extracted via pattern matching from final 10 lines of each letter. Warmth scored 1–5 from formal ("yours faithfully") to intimate ("your devoted"). Binary segmentation with BIC penalty. 2,076 of 2,171 letters (95.6%) yielded extractable sign-offs.
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<SignOffViz />);
  </script>
</body>
</html>
