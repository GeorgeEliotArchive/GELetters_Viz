<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#fafafa;color:#2a2a2a;font-family:'DM Sans',sans-serif;}

.reading{font-size:10px;color:rgba(42,42,42,0.4);text-align:center;margin-bottom:14px;font-style:italic;line-height:1.6;}

const CN=["Publishers","Inner Circle","Other Women","Other Men"];
const CC=["#c48a1a","#2e74a8","#7a60b0","#3d8a50"];
const CCA=["rgba(196,138,26,0.55)","rgba(46,116,168,0.55)","rgba(122,96,176,0.5)","rgba(61,138,80,0.5)"];
const dpr=window.devicePixelRatio||1;
const tt=document.getElementById('tooltip');
function showTT(e,html){tt.innerHTML=html;tt.style.opacity=1;const tx=e.clientX+12;tt.style.left=(tx+300>window.innerWidth?e.clientX-310:tx)+'px';tt.style.top=(e.clientY-10)+'px';}
function hideTT(){tt.style.opacity=0;}
function initC(id,h){const c=document.getElementById(id),ctx=c.getContext('2d'),w=c.parentElement.getBoundingClientRect().width-32;c.style.width=w+'px';c.width=w*dpr;c.height=h*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);return{c,ctx,w,h};}

function drBox(id,key){
  const{c,ctx,w,h}=initC(id,200);const mg={t:10,r:12,b:24,l:80},pW=w-mg.l-mg.r,pH=h-mg.t-mg.b;
  ctx.clearRect(0,0,w,h);const D=SUPP.catBox;const n=D.length;const bh=pH/n-14;const meta=[];
  [0,.25,.5,.75,1].forEach(v=>{const x=mg.l+v*pW;ctx.strokeStyle='rgba(42,42,42,0.06)';ctx.beginPath();ctx.moveTo(x,mg.t);ctx.lineTo(x,mg.t+pH);ctx.stroke();ctx.fillStyle='rgba(42,42,42,0.22)';ctx.font='9px "DM Sans",sans-serif';ctx.textAlign='center';ctx.fillText(v===0?'0':v===1?'1':v.toFixed(2),x,h-5);});
  D.forEach((d,i)=>{const cy=mg.t+12+i*(pH/n)+bh/2;const mn=d[key+'Min'],q1=d[key+'Q1'],med=d[key+'Med'],q3=d[key+'Q3'],mx2=d[key+'Max'];
    ctx.strokeStyle='rgba(42,42,42,0.2)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(mg.l+mn*pW,cy);ctx.lineTo(mg.l+q1*pW,cy);ctx.stroke();ctx.beginPath();ctx.moveTo(mg.l+q3*pW,cy);ctx.lineTo(mg.l+mx2*pW,cy);ctx.stroke();
    const bx=mg.l+q1*pW,bw2=(q3-q1)*pW;ctx.fillStyle=CCA[d.cat];ctx.fillRect(bx,cy-bh/2,bw2,bh);ctx.strokeStyle=CC[d.cat];ctx.lineWidth=1.5;ctx.strokeRect(bx,cy-bh/2,bw2,bh);
    ctx.strokeStyle=CC[d.cat];ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(mg.l+med*pW,cy-bh/2);ctx.lineTo(mg.l+med*pW,cy+bh/2);ctx.stroke();
    ctx.fillStyle='rgba(42,42,42,0.5)';ctx.font='10px "DM Sans",sans-serif';ctx.textAlign='right';ctx.fillText(CN[d.cat],mg.l-6,cy+3);
    meta.push({y:cy-bh/2,h:bh,d,key});
  });
  c.onmousemove=e=>{const r=c.getBoundingClientRect(),my=e.clientY-r.top;let found=null;for(const m of meta){if(my>=m.y&&my<=m.y+m.h){found=m;break;}}if(found){const d=found.d,k=found.key;showTT(e,'<div class="tt-t">'+CN[d.cat]+' ('+d.n+' letters)</div><div class="tt-m">Min: '+d[k+'Min'].toFixed(2)+' \xb7 Q1: '+d[k+'Q1'].toFixed(2)+'</div><div class="tt-m">Median: '+d[k+'Med'].toFixed(2)+' \xb7 Mean: '+d[k+'Avg'].toFixed(2)+'</div><div class="tt-m">Q3: '+d[k+'Q3'].toFixed(2)+' \xb7 Max: '+d[k+'Max'].toFixed(2)+'</div>');}else hideTT();};
